<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>资源嗅探器</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        width: 480px;
        max-height: 600px;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 8px 12px;
        border-bottom: 1px solid #8884;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      header h1 { font-size: 14px; margin: 0; flex: 1; }
      header button, header select, header input {
        font-size: 12px;
        padding: 4px 8px;
      }
      #summary { padding: 6px 12px; font-size: 12px; opacity: .8; }
      #list {
        flex: 1;
        overflow: auto;
        padding: 4px 12px 12px;
        font-size: 12px;
      }
      .item {
        display: grid;
        grid-template-columns: 60px 1fr auto;
        gap: 6px;
        padding: 4px 0;
        border-bottom: 1px dashed #8883;
        align-items: center;
      }
      .type {
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        color: #06f;
      }
      .url {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        cursor: pointer;
      }
      .url:hover { text-decoration: underline; }
      .size { opacity: .6; font-variant-numeric: tabular-nums; }
      .empty { padding: 20px; text-align: center; opacity: .6; }
    </style>
  </head>
  <body>
    <header>
      <h1>资源嗅探器</h1>
      <select id="filter">
        <option value="">全部类型</option>
      </select>
      <input id="search" type="search" placeholder="按 URL 过滤…" />
      <button id="refresh">刷新</button>
      <button id="export">导出 ZIP</button>
      <button id="clear">清空</button>
    </header>
    <div id="summary"></div>
    <div id="list"><div class="empty">加载中…</div></div>
    <!-- popup.ts 由 Vite 打包成 popup.js，fflate 直接 bundle 进去。 -->
    <script src="./src/popup.ts" type="module"></script>
  </body>
</html>
