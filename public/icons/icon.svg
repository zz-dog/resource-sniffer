<?xml version="1.0" encoding="UTF-8"?>
<!-- 资源嗅探器图标：放大镜 + 三条代表"资源"的横线 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角方块 -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#g)"/>
  <!-- 放大镜镜框 -->
  <circle cx="54" cy="54" r="26" fill="none" stroke="#fff" stroke-width="8"/>
  <!-- 放大镜手柄 -->
  <line x1="74" y1="74" x2="100" y2="100" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- 镜内三条"资源列表"横线 -->
  <line x1="42" y1="48" x2="66" y2="48" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="42" y1="56" x2="66" y2="56" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="42" y1="64" x2="60" y2="64" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
</svg>
